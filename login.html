<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FinTrack - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif,sans-serif;background:white;}
        .card{background:#1a1a2e;border-radius:24px;padding:40px;margin: 80px auto;max-width:520px;box-shadow:0 18px 45px rgba(0,0,0,.08)}
        .logo{display:flex;align-items:center;gap:10px;margin-bottom:30px}
        .logo-icon{width:40px;height:40px;background:#1a1a2e;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#0d9e75;font-weight:700}
        .logo-text{font-size:24px;color:#1a1a2e}
        h1{font-size:37px;margin-bottom:24px;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .sub{color:#6b7280;margin-bottom:30px}
        .field{margin-bottom:16px;margin: 80px 0 8px;padding: 40px; background-color: aqua;border-radius: 24px}
        .field label{display:block;font-size:16px 0 16px;margin-bottom:6px;border-radius: 12px;font-size: 20px;}
        .field input{width:100%;padding:14px 16px;border:1.5px solid #e5e7eb;border-radius:16px;font-size:16px}
        .field input:focus{border-color:#0d9e75;outline:none}
        .btn{width:100%;padding:16px;background:#1a1a2e;color:white;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}
        .btn:hover{background:#2d2d4a}
        .signup-link{text-align:center;margin-top:20px;font-size:13px;color:#6b7280}
        .signup-link a{color:#0d9e75;text-decoration:none}
        .error{color:#dc2626;font-size:12px;margin-top:4px;display:none}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:12px 22px;border-radius:10px;display:none}
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><div class="logo-icon">Ft</div><span class="logo-text">FinTrack</span></div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to continue</p>
    
    <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="demo@fintrack.com">
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
        <div class="error" id="loginError">Invalid email or password</div>
    </div>
    
    <button class="btn" onclick="handleLogin()">Log In</button>
    
    <p class="signup-link">Don't have an account? <a href="/signup">Sign up</a></p>
</div>
<div class="toast" id="toastMsg"></div>

<script>
async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    const response = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
    });
    
    const result = await response.json();
    
    if (result.ok) {
        showToast('Login successful! Redirecting...');
        setTimeout(() => window.location.href = '/dashboard', 1000);
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
}

// Demo account quick login
function demoLogin() {
    document.getElementById('loginEmail').value = 'demo@fintrack.com';
    document.getElementById('loginPassword').value = 'demo123';
    handleLogin();
}
</script>
</body>
</html>
